version: "3.8"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password@db:5432/gdgoc
      - DEBUG=true
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
      - GCS_SIGNED_URL_EXPIRATION_SECONDS=${GCS_SIGNED_URL_EXPIRATION_SECONDS}
      - GOOGLE_APPLICATION_CREDENTIALS=/gcloud/application_default_credentials.json
    depends_on:
      - db
    volumes:
      - .:/app
      - ${HOME}/.config/gcloud/application_default_credentials.json:/gcloud/application_default_credentials.json:ro
    command:
      [
        "poetry",
        "run",
        "uvicorn",
        "app.main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000",
        "--reload",
      ]
    networks:
      - gdgoc-network

  db:
    image: postgres:15
    environment:
      - POSTGRES_DB=gdgoc
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gdgoc-network

volumes:
  postgres_data:

networks:
  gdgoc-network:
    driver: bridge
